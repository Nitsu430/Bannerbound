plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    // Ponder library — Create-style in-game tutorial scenes. Used as a SOFT dependency:
    // the API is on the compile classpath here; the runtime classes ship inside Create's jar
    // (Create jar-in-jars ponder-neoforge), so we only see Ponder when Create is installed.
    maven { url = "https://maven.createmod.net" }
    maven { url = "https://maven.blamejared.com" }
    // Modrinth — only used to pull Iris + Sodium for dev-client shaderpack testing.
    // Scoped to the maven.modrinth group so it doesn't slow down other dependency resolution.
    maven {
        url = "https://api.modrinth.com/maven"
        content { includeGroup "maven.modrinth" }
    }
}

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Explicit username so the offline-mode UUID is stable + distinct from `client2`.
            // Without this, both clients would derive UUIDs from username "Dev" and the
            // dedicated server would kick the second one as a duplicate login.
            programArguments.addAll '--username', 'Dev1'

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // Second client for two-player multiplayer testing — runs alongside `runClient` and
        // `runServer`. Connect both to the dedicated server via Multiplayer → Direct Connect
        // → localhost (or 127.0.0.1) once it's up. Distinct username + game directory so the
        // two clients don't collide on UUID, options.txt, or saves.
        clientJei {
            client()
            programArguments.addAll '--username', 'DevJEI'
            gameDirectory = project.file('run-jei')
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            systemProperty 'bannerbound.dev.jeiProfile', 'true'
        }

        client2 {
            client()
            programArguments.addAll '--username', 'Dev2'
            gameDirectory = project.file('run-client2')
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // JEI is optional: compile against the API, load the full mod only in local dev runs.
    compileOnly "mezz.jei:jei-${minecraft_version}-common-api:${jei_version}"
    compileOnly "mezz.jei:jei-${minecraft_version}-neoforge-api:${jei_version}"
    localRuntime "mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}"

    // Iris + Sodium — dev-client ONLY (localRuntime), so the faith sky can be tested under a
    // shaderpack. Both are client-side mods; the dedicated-server run simply skips them. Never
    // shipped. Sodium must load too — Iris requires it. See gradle.properties for the versions.
    localRuntime "maven.modrinth:sodium:${sodium_version}"
    localRuntime "maven.modrinth:iris:${iris_version}"

    implementation "maven.modrinth:jade:${jade_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // Bannerbound: Core — this expansion is built against Core's API. Resolved through the
    // composite build declared in settings.gradle (includeBuild '../MDK'), so it always
    // tracks the local Core sources. Core is also a required mod dependency at runtime
    // (declared in neoforge.mods.toml).
    implementation 'com.bannerbound.core:bannerbound:1.0.0'

    // Ponder — compile-only. Antiquity's Ponder-touching classes (BannerboundAntiquityPonderPlugin,
    // PonderBootstrap) compile against this API but are only class-loaded when Create is detected
    // at runtime (ModList.isLoaded("create")). For dev-client testing of ponders, also add a Create
    // jar via localRuntime (drop a jar into libs/ and reference it, or includeBuild the local
    // Create dev source).
    compileOnly "net.createmod.ponder:ponder-neoforge:1.0.82+mc${minecraft_version}"

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

tasks.register('verifyJeiRuntime') {
    description = 'Resolve the JEI runtime mod used by Antiquity dev-client testing.'
    group = 'verification'
    doLast {
        def jeiFiles = configurations.localRuntime.resolve().findAll { it.name.toLowerCase(Locale.ROOT).contains('jei') }
        if (jeiFiles.isEmpty()) {
            throw new GradleException('JEI was not found on localRuntime.')
        }
        logger.lifecycle("JEI runtime ready: ${jeiFiles.collect { it.name }.join(', ')}")
    }
}

tasks.register('buildJeiTest') {
    description = 'Build Antiquity and verify the JEI localRuntime profile for runClientJei.'
    group = 'verification'
    dependsOn 'build', 'verifyJeiRuntime'
}

// ─── Dev ops setup ─────────────────────────────────────────────────────────────────
// Pre-populates the dedicated-server's ops.json with Dev1 + Dev2 (the usernames our
// runClient + runClient2 configs use) so both dev clients connect as operators on
// first launch — no need to drop into the server console and run /op manually.
//
// Vanilla offline-mode UUIDs are deterministic: UUID.nameUUIDFromBytes(
// "OfflinePlayer:<name>".getBytes(UTF_8)). The server matches the joining player by
// UUID, so we compute Dev1's + Dev2's UUIDs the same way and bake them in.
//
// MERGE semantics, not overwrite: existing ops survive across reruns. Each task run
// just guarantees Dev1 + Dev2 are present at level 4. Re-run safely after /op Foo
// inside the server — Foo stays opped.
def offlineUuid = { String username ->
    def bytes = ("OfflinePlayer:" + username).getBytes(java.nio.charset.StandardCharsets.UTF_8)
    return UUID.nameUUIDFromBytes(bytes).toString()
}

tasks.register('ensureDevOps') {
    description = 'Pre-populate ops.json with Dev1 + Dev2 so both dev clients connect as operators.'
    group = 'bannerbound'
    def opsFile = layout.projectDirectory.file('run/ops.json').asFile
    doLast {
        opsFile.parentFile.mkdirs()
        // Merge: keep any existing entries that aren't Dev1 / Dev2, append Dev1 + Dev2.
        // groovy.json.JsonSlurper + JsonOutput are auto-imported inside Gradle build scripts;
        // skip explicit imports so IntelliJ's Groovy editor (which doesn't see Gradle's
        // bundled groovy-json) stops complaining.
        List existing = []
        if (opsFile.exists() && opsFile.length() > 0) {
            try {
                def parsed = new groovy.json.JsonSlurper().parse(opsFile)
                if (parsed instanceof List) existing = parsed
            } catch (Exception ignored) {
                logger.warn("Could not parse existing ops.json — rewriting from scratch.")
            }
        }
        def kept = existing.findAll { entry ->
            entry?.name != 'Dev1' && entry?.name != 'Dev2'
        }
        kept << [uuid: offlineUuid('Dev1'), name: 'Dev1', level: 4, bypassesPlayerLimit: false]
        kept << [uuid: offlineUuid('Dev2'), name: 'Dev2', level: 4, bypassesPlayerLimit: false]
        opsFile.text = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(kept))
        logger.lifecycle("Wrote dev ops (Dev1, Dev2) to ${opsFile.absolutePath}")
    }
}

tasks.named('runServer').configure {
    dependsOn 'ensureDevOps'
}
